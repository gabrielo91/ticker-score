name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check boundaries
        run: pnpm check:boundaries

      - name: Check no-any
        run: pnpm check:no-any

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Lint
        run: pnpm turbo lint
        continue-on-error: true  # ESLint configs incomplete in Phase 0

      - name: Build
        run: pnpm turbo build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm turbo test
        continue-on-error: true  # Tests being added incrementally

  e2e:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      # Gate the rest of the job on the TWELVEDATA_API_KEY secret (the
      # default data source). PRs from forks (and runs in repos that
      # haven't configured the secret yet) don't have access to it; we
      # surface a warning and skip the remaining steps instead of failing
      # the workflow.
      - name: Check Twelve Data key availability
        id: gate
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: |
          if [ -n "$TWELVEDATA_API_KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::warning::TWELVEDATA_API_KEY secret is not configured — skipping E2E smoke tests. Set it under repo Settings → Secrets and variables → Actions."
          fi

      - if: steps.gate.outputs.has_key == 'true'
        uses: pnpm/action-setup@v4

      - if: steps.gate.outputs.has_key == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - if: steps.gate.outputs.has_key == 'true'
        name: Install dependencies
        run: pnpm install --frozen-lockfile

      - if: steps.gate.outputs.has_key == 'true'
        name: Build workspace
        run: pnpm turbo build

      - if: steps.gate.outputs.has_key == 'true'
        name: Start Next.js production server (background)
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          pnpm --filter @darkscore/web start > /tmp/next.log 2>&1 &
          echo $! > /tmp/next.pid
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 30s"
          cat /tmp/next.log
          exit 1

      - if: steps.gate.outputs.has_key == 'true'
        name: Run E2E smoke tests
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DARKSCORE_E2E_BASE_URL: http://localhost:3000
        run: pnpm --filter @darkscore/web test

      - if: always() && steps.gate.outputs.has_key == 'true'
        name: Stop Next.js server
        run: |
          if [ -f /tmp/next.pid ]; then
            kill -TERM $(cat /tmp/next.pid) 2>/dev/null || true
            sleep 1
            kill -KILL $(cat /tmp/next.pid) 2>/dev/null || true
          fi
          echo "--- server log (tail) ---"
          tail -100 /tmp/next.log 2>/dev/null || true

